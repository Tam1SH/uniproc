    "ProcessesUiAdapter::set_column_widths",
    "ProcessesUiAdapter::set_column_metadata",
    "ProcessesUiAdapter::set_total_processes_count",
    "ServicesUiAdapter::set_total_services_count",
    "ServicesUiAdapter::set_column_widths",
]
